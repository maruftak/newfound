# Example reconsentry scope.
# Only monitor targets you own or that are explicitly in scope for an
# authorized bug-bounty / vulnerability-disclosure program.

name: example-program

targets:
  - example.com
  # - example.org

# Hosts/subtrees to ignore (exact host or any subdomain of it).
exclude:
  - internal.example.com

# Minimum priority to report: low | medium | high
min_priority: medium

# Alert when a host's resolved IP changes. Off by default: CDN/cloud hosts
# (Vercel, Cloudflare, …) rotate IPs constantly and would spam false alerts.
track_ip: false

# Each list is a set of destination URLs rendered in that platform's format,
# so one scope can alert a generic endpoint, Slack, and Discord at once.
notify:
  webhooks: []   # generic JSON POST to any endpoint
  slack: []      # e.g. https://hooks.slack.com/services/XXX/YYY/ZZZ
  discord: []    # e.g. https://discord.com/api/webhooks/XXX/YYY
  telegram: []   # e.g. - { token: "123:ABC", chat_id: "987" }
  email: []      # e.g. - { smtp_host: smtp.gmail.com, smtp_port: 587, username: u, password: p, from: u, to: [you] }
